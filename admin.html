<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead-Verwaltung – Nexovia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #e7e7e7;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Gesammelte Leads</h1>
  <div style="text-align:center; margin-bottom: 20px;">
    <button id="exportCsvBtn" style="padding: 8px 12px; font-size: 14px; cursor: pointer;">CSV exportieren</button>
    <button id="deleteLeadsBtn" style="padding: 8px 12px; font-size: 14px; cursor: pointer; margin-left: 10px; background-color: #ef4444; color: #fff; border: none;">Leads löschen</button>
  </div>
  <div id="error" class="error"></div>
  <table id="leadsTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>E‑Mail</th>
        <th>Telefon</th>
        <th>Immobilientyp</th>
        <th>Dachfläche (m²)</th>
        <th>Baujahr</th>
        <th>Heizsystem</th>
        <th>Zeitstempel</th>
      </tr>
    </thead>
    <tbody>
      <!-- Leads werden hier eingefügt -->
    </tbody>
  </table>

  <script>
    // Admin token used to authenticate requests to /api/leads
    const ADMIN_TOKEN = 'secret';

    async function loadLeads() {
      try {
        const response = await fetch('/api/leads', {
          headers: { 'X-Admin-Token': ADMIN_TOKEN }
        });
        if (!response.ok) {
          const errorData = await response.json();
          document.getElementById('error').textContent = errorData.error || 'Fehler beim Laden der Leads';
          return;
        }
        const leads = await response.json();
        const tbody = document.getElementById('leadsTable').querySelector('tbody');
        if (!leads.length) {
          document.getElementById('error').textContent = 'Noch keine Leads vorhanden.';
          return;
        }
        leads.forEach((lead) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${lead.customerName || ''}</td>
            <td>${lead.customerEmail || ''}</td>
            <td>${lead.customerPhone || ''}</td>
            <td>${lead.propertyType || ''}</td>
            <td>${lead.roofArea || ''}</td>
            <td>${lead.buildingYear || ''}</td>
            <td>${lead.heatingSystem || ''}</td>
            <td>${new Date(lead.timestamp).toLocaleString('de-DE')}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        document.getElementById('error').textContent = 'Fehler beim Laden der Leads.';
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadLeads);

    // Export leads to CSV by requesting the /api/leads/csv endpoint
    async function exportCSV() {
      try {
        const response = await fetch('/api/leads/csv', {
          headers: { 'X-Admin-Token': ADMIN_TOKEN }
        });
        if (!response.ok) {
          const errorData = await response.json();
          alert(errorData.error || 'Fehler beim Exportieren der Leads.');
          return;
        }
        const csv = await response.text();
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'leads.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error('Fehler beim CSV-Export:', err);
        alert('Fehler beim CSV-Export.');
      }
    }

    // Attach click listener to export button
    document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);

    // Delete all leads via DELETE endpoint
    async function deleteLeads() {
      if (!confirm('Möchten Sie wirklich alle Leads löschen?')) {
        return;
      }
      try {
        const response = await fetch('/api/leads', {
          method: 'DELETE',
          headers: { 'X-Admin-Token': ADMIN_TOKEN }
        });
        if (!response.ok) {
          const errorData = await response.json();
          alert(errorData.error || 'Fehler beim Löschen der Leads.');
          return;
        }
        alert('Alle Leads wurden gelöscht.');
        // Leert die Tabelle und aktualisiert die Fehlermeldung
        document.getElementById('leadsTable').querySelector('tbody').innerHTML = '';
        document.getElementById('error').textContent = 'Keine Leads vorhanden.';
      } catch (err) {
        console.error('Fehler beim Löschen der Leads:', err);
        alert('Fehler beim Löschen der Leads.');
      }
    }

    // Attach listener to delete button
    document.getElementById('deleteLeadsBtn').addEventListener('click', deleteLeads);
  </script>
</body>
</html>
