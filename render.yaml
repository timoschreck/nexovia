services:
  - type: web
    name: nexovia-backend
    env: node
    buildCommand: npm install
    startCommand: node server_updated.js
    autoDeploy: true
    plan: free
    envVars:
      - key: ADMIN_TOKEN
        value: CHANGE_ME
      - key: SMTP_HOST
        value: smtp.example.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        value: user@example.com
      - key: SMTP_PASS
        value: yourpassword
      - key: SMTP_FROM
        value: noreply@example.com
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: RECAPTCHA_SECRET
        value: YOUR_RECAPTCHA_SECRET_KEY
